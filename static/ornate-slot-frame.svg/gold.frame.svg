<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e7ad"></stop>
      <stop offset="18%" stop-color="#d7af45"></stop>
      <stop offset="38%" stop-color="#fff3c5"></stop>
      <stop offset="58%" stop-color="#b78620"></stop>
      <stop offset="78%" stop-color="#efd276"></stop>
      <stop offset="100%" stop-color="#9f6910"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#7a5814" flood-opacity="0.18"></feDropShadow>
    </filter>

    <g id="corner">
      <path d="M88 70
               C58 70 36 90 36 120
               C36 140 45 156 60 164
               C53 150 53 136 62 125
               C71 114 87 112 99 120
               C112 128 115 145 106 158
               C96 172 80 180 62 178
               C86 193 114 190 136 171
               C161 149 168 114 151 87
               C139 68 119 58 96 56" stroke="url(#gold)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>

      <path d="M96 92
               C80 92 68 101 68 116
               C68 128 74 136 83 141
               C79 134 79 127 84 121
               C89 115 99 114 106 119
               C114 124 116 134 111 142
               C105 152 94 157 83 155
               C97 163 114 160 126 150
               C140 138 144 121 136 105" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>

      <path d="M132 58
               C148 60 160 69 168 82
               C155 82 142 77 132 58Z" fill="url(#gold)" opacity="0.9"></path>

      <path d="M58 164
               C44 169 32 180 28 194
               C42 190 53 181 58 164Z" fill="url(#gold)" opacity="0.85"></path>

      <circle cx="84" cy="78" r="6" fill="url(#gold)"></circle>
    </g>
  </defs>

  <rect width="1000" height="700" fill="transparent"></rect>

  <g filter="url(#shadow)">
    <!-- outer lines -->
    <line x1="106" y1="74" x2="894" y2="74" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round"></line>
    <line x1="926" y1="106" x2="926" y2="594" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round"></line>
    <line x1="894" y1="626" x2="106" y2="626" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round"></line>
    <line x1="74" y1="594" x2="74" y2="106" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round"></line>

    <!-- inner lines -->
    <line x1="124" y1="92" x2="876" y2="92" stroke="url(#gold)" stroke-width="2.2" opacity="0.85" stroke-linecap="round"></line>
    <line x1="908" y1="124" x2="908" y2="576" stroke="url(#gold)" stroke-width="2.2" opacity="0.85" stroke-linecap="round"></line>
    <line x1="876" y1="608" x2="124" y2="608" stroke="url(#gold)" stroke-width="2.2" opacity="0.85" stroke-linecap="round"></line>
    <line x1="92" y1="576" x2="92" y2="124" stroke="url(#gold)" stroke-width="2.2" opacity="0.85" stroke-linecap="round"></line>

    <!-- 4 corners -->
    <use href="#corner" x="0" y="0"></use>
    <use href="#corner" transform="translate(1000 0) scale(-1 1)"></use>
    <use href="#corner" transform="translate(0 700) scale(1 -1)"></use>
    <use href="#corner" transform="translate(1000 700) scale(-1 -1)"></use>
  </g>
</svg>